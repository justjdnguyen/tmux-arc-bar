# List of plugins
set-option -g prefix C-b
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'vaaleyard/tmux-dotbar'
# set -g @tmux-dotbar-fg-session "#cba6f7"
# set -g @tmux-dotbar-fg-prefix "#cba6f7"
# set -g @tmux-dotbar-window-status-format ' [#I] #W '
# set -g @tmux-dotbar-right true
# set -g @tmux-dotbar-status-right-text " %H:%M "
# set -g @tmux-dotbar-position bottom

# Enable truecolor support
set -ga terminal-overrides ",*256col*:Tc,xterm*:Tc,alacritty:Tc"

# Custom gradient status bar
set -g status-position bottom
set -g status-justify centre
set -g status-style "bg=colour235"
set -g status-left-length 60
set -g status-right-length 60

# Left: session name with blue-to-white gradient
set -g status-left "#[fg=colour255,bg=colour33] #S #[fg=colour235,bg=colour39] #[fg=colour235,bg=colour75] #[fg=colour235,bg=colour117] #[fg=colour235,bg=colour255] "

# Window tabs
set -g window-status-format "#[fg=colour245,bg=colour235] [#I] #W "
set -g window-status-current-format "#[fg=colour75,bg=colour235,bold] [#I] #W "

# Right: time with blue-to-white gradient (reversed)
set -g status-right "#[fg=colour235,bg=colour255] #[fg=colour235,bg=colour117] #[fg=colour235,bg=colour75] #[fg=colour235,bg=colour39] #[fg=colour255,bg=colour33] %H:%M "

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
